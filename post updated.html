<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UnBeaten Desire</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3026369923527358"
     crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&family=Fraunces:ital,wght@1,400;0,500&display=swap');

  :root{
    --cream:#FFF8EF; --card:#FFFFFF; --ink:#2E2233; --muted:#8B7E8C;
    --coral:#FF6B57; --marigold:#FFB84D; --rose:#FF8FA8; --line:#F0E4D4;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{ background:var(--cream); color:var(--ink); font-family:'Inter',sans-serif; }
  a{ color:inherit; text-decoration:none; }

  #progress{
    position:fixed; top:0; left:0; height:3px; width:0%;
    background:linear-gradient(90deg,var(--coral),var(--marigold));
    z-index:999; transition:width .1s linear;
  }

  nav{
    position:fixed; top:0; width:100%; z-index:100;
    display:flex; justify-content:space-between; align-items:center;
    padding:18px 6vw; background:rgba(255,248,239,0.9); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .wordmark{ font-family:'Poppins'; font-weight:800; font-size:1.05rem; }
  .wordmark span{ color:var(--coral); }
  .back-link{ font-size:0.85rem; font-weight:600; color:var(--muted); display:flex; align-items:center; gap:6px; }
  .back-link:hover{ color:var(--coral); }

  .post-header{ max-width:720px; margin:0 auto; padding:130px 6vw 20px; text-align:center; }
  .post-tag{
    display:inline-block; font-size:0.75rem; font-weight:700;
    padding:6px 14px; border-radius:100px; margin-bottom:20px;
  }
  .tag-love{ background:#FFE3E8; color:#D6486A; }
  .tag-reflection{ background:#E4E9FF; color:#5468D6; }
  .tag-faith{ background:#FFF1D6; color:#C98A1E; }
  .tag-zodiac{ background:#F0E4FF; color:#9B5DE0; }
  .tag-family{ background:#E1F5EC; color:#1E9E6E; }
  .post-header h1{
    font-family:'Poppins'; font-weight:800; font-size:clamp(1.9rem,4.5vw,2.8rem);
    line-height:1.2; margin-bottom:18px;
  }
  .post-meta-row{ display:flex; justify-content:center; gap:16px; font-size:0.85rem; color:var(--muted); flex-wrap:wrap; }

  .hero-img{ max-width:680px; margin:30px auto 0; padding:0 6vw; }
  .hero-img img{ width:100%; border-radius:20px; display:block; object-fit:cover; max-height:380px; }

  .post-body{
    max-width:680px; margin:40px auto 0; padding:0 6vw 60px;
    font-family:'Fraunces', serif; font-size:1.18rem; line-height:1.85; color:#3A2D3D;
  }
  .post-body p{ margin-bottom:26px; }
  .post-body p:first-of-type::first-letter{
    font-size:3.6rem; font-weight:700; float:left; line-height:0.85; margin:8px 10px 0 0;
    color:var(--coral); font-family:'Poppins';
  }

  .ad-slot{
    max-width:680px; margin:40px auto; padding:20px 6vw; text-align:center;
    border:1px dashed var(--line); border-radius:14px; color:var(--muted);
    font-size:0.78rem; font-family:monospace; background:rgba(255,255,255,0.5);
  }

  #sharePopover{
    position:absolute; display:none; background:var(--ink); color:#fff;
    padding:8px 12px; border-radius:10px; font-family:'Inter'; font-size:0.8rem;
    font-weight:600; gap:10px; z-index:200; align-items:center; box-shadow:0 8px 20px rgba(0,0,0,0.25);
  }
  #sharePopover button{ background:none; border:none; color:#fff; cursor:pointer; font-size:1rem; }
  #sharePopover::after{
    content:''; position:absolute; bottom:-6px; left:50%; transform:translateX(-50%);
    border:6px solid transparent; border-top-color:var(--ink);
  }

  .reaction-bar{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--card); border:1px solid var(--line); border-radius:100px;
    display:flex; gap:6px; padding:8px; box-shadow:0 12px 30px rgba(46,34,51,0.12); z-index:90;
  }
  .reaction-bar button{
    background:var(--cream); border:none; border-radius:100px; padding:8px 14px;
    cursor:pointer; font-size:1rem; transition:transform .2s, background .2s;
    display:flex; align-items:center; gap:6px; font-family:'Inter'; font-weight:600; font-size:0.85rem;
  }
  .reaction-bar button:hover{ transform:translateY(-3px); background:var(--line); }
  .reaction-bar .share-btn{ background:var(--coral); color:#fff; }
  .reaction-bar .share-btn:hover{ background:#e85a47; }

  .continue{ max-width:680px; margin:60px auto 0; padding:0 6vw; }
  .continue-card{
    background:var(--card); border:1px solid var(--line); border-radius:22px;
    padding:28px 30px; display:flex; justify-content:space-between; align-items:center;
    gap:20px; flex-wrap:wrap; cursor:pointer;
  }
  .continue-label{ font-size:0.75rem; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px; }
  .continue-title{ font-family:'Poppins'; font-weight:700; font-size:1.1rem; }
  .continue-arrow{
    background:var(--coral); color:#fff; width:40px; height:40px; border-radius:100px;
    display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0;
  }

  .comments{ max-width:680px; margin:60px auto 120px; padding:0 6vw; }
  .comments h3{ font-family:'Poppins'; font-weight:700; font-size:1.2rem; margin-bottom:20px; }
  .comment-form{ display:flex; flex-direction:column; gap:10px; margin-bottom:30px; }
  .comment-form textarea{
    border:1px solid var(--line); border-radius:14px; padding:14px 16px; font-family:'Inter';
    font-size:0.92rem; resize:vertical; min-height:80px; background:var(--card);
  }
  .comment-form textarea:focus{ outline:none; border-color:var(--coral); }
  .comment-form button{
    align-self:flex-end; background:var(--ink); color:#fff; border:none; padding:10px 22px;
    border-radius:100px; font-weight:700; font-size:0.85rem; cursor:pointer;
  }
  .comment{
    background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px 18px;
    margin-bottom:12px; font-size:0.92rem;
  }
  .comment .who{ font-weight:700; font-size:0.85rem; margin-bottom:4px; }
  .comment .when{ color:var(--muted); font-size:0.75rem; font-weight:400; margin-left:8px; }
  .site-footer{ padding:36px 6vw 120px; text-align:center; font-size:0.8rem; color:var(--muted); }
  .site-footer .footer-links{ margin-top:10px; display:flex; gap:18px; justify-content:center; flex-wrap:wrap; }
  .site-footer .footer-links a{ color:var(--muted); text-decoration:underline; }
</style>
</head>
<body>

<div id="progress"></div>

<nav>
  <a href="unbeatendesire-homepage.html" class="wordmark">Un<span>Beaten</span> Desire</a>
  <a href="unbeatendesire-homepage.html" class="back-link">← All stories</a>
</nav>

<div class="post-header" id="postHeader">
  <span class="post-tag" id="postTag"></span>
  <h1 id="postTitle"></h1>
  <div class="post-meta-row" id="postMetaRow"></div>
</div>

<div class="hero-img" id="heroImgWrap" style="display:none;">
  <img id="heroImg" alt="">
</div>

<div class="post-body" id="postBody"></div>

<div class="ad-slot">AD SLOT — in-article native unit (Google's highest-RPM placement)</div>

<div id="sharePopover">
  <span>Share this line</span>
  <button onclick="shareHighlight()">📤 Share</button>
</div>

<div class="continue" id="continueWrap" style="display:none;">
  <div class="continue-card" id="continueCard">
    <div>
      <div class="continue-label">Continue the story</div>
      <div class="continue-title" id="continueTitle"></div>
    </div>
    <div class="continue-arrow">→</div>
  </div>
</div>

<div class="comments">
  <h3>What did this stir up for you?</h3>
  <div class="comment-form">
    <textarea placeholder="Share your thoughts..."></textarea>
    <button onclick="postComment()">Post comment</button>
  </div>
  <div id="commentsList"></div>
</div>

<footer class="site-footer">
  UnBeaten Desire — est. 2011 · Bangalore & the internet 🪔
  <div class="footer-links">
    <a href="about.html">About</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="contact.html">Contact</a>
  </div>
</footer>

<div class="reaction-bar">
  <button onclick="react(this,'❤️')">❤️ <span id="countHeart">0</span></button>
  <button onclick="react(this,'🙏')">🙏 <span id="countPray">0</span></button>
  <button onclick="react(this,'💔')">💔 <span id="countBroken">0</span></button>
  <button class="share-btn" onclick="shareFull()">Share this story</button>
</div>

<script src="posts-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://gycfomvjfsddvabzkegv.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6IKxUgL9LX6oW7YFmqUuXA_IGeeEFpL';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const MOOD_META = {
    love: { emoji:'💕', label:'Love', cls:'tag-love' },
    reflection: { emoji:'🤔', label:'Reflection', cls:'tag-reflection' },
    zodiac: { emoji:'🔮', label:'Zodiac', cls:'tag-zodiac' },
    faith: { emoji:'🙏', label:'Faith', cls:'tag-faith' },
    family: { emoji:'👨‍👧', label:'Family', cls:'tag-family' },
  };

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const POST = POSTS.find(p => p.slug === slug) || POSTS[0];
  const POST_SLUG = POST.slug;

  document.title = POST.title + ' — UnBeaten Desire';

  const metaDesc = document.createElement('meta');
  metaDesc.name = 'description';
  metaDesc.content = POST.excerpt;
  document.head.appendChild(metaDesc);

  const ogTags = {
    'og:title': POST.title,
    'og:description': POST.excerpt,
    'og:type': 'article',
    'og:url': window.location.href,
    'og:image': POST.heroImg || 'https://www.unbeatendesire.com/og-default.jpg',
  };
  Object.entries(ogTags).forEach(([prop, content]) => {
    const tag = document.createElement('meta');
    tag.setAttribute('property', prop);
    tag.setAttribute('content', content);
    document.head.appendChild(tag);
  });

  const canonical = document.createElement('link');
  canonical.rel = 'canonical';
  canonical.href = `https://www.unbeatendesire.com/post.html?slug=${POST.slug}`;
  document.head.appendChild(canonical);

  const meta = MOOD_META[POST.mood] || { emoji:'📝', label:POST.mood, cls:'tag-reflection' };
  document.getElementById('postTag').className = 'post-tag ' + meta.cls;
  document.getElementById('postTag').textContent = meta.emoji + ' ' + meta.label;
  document.getElementById('postTitle').textContent = POST.title;
  document.getElementById('postMetaRow').innerHTML = `
    <span>${new Date(POST.date).toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span>
    <span>·</span><span>${POST.readMin} min read</span>`;

  if(POST.heroImg){
    document.getElementById('heroImgWrap').style.display = 'block';
    document.getElementById('heroImg').src = POST.heroImg;
  }

  document.getElementById('postBody').innerHTML =
    POST.paragraphs.map(p => `<p>${p}</p>`).join('');

  // Continue the story — next post by date
  const idx = POSTS.findIndex(p => p.slug === POST.slug);
  const nextPost = POSTS[(idx + 1) % POSTS.length];
  document.getElementById('continueWrap').style.display = 'block';
  document.getElementById('continueTitle').textContent = nextPost.title + ' →';
  document.getElementById('continueCard').onclick = () => {
    window.location.href = 'post.html?slug=' + encodeURIComponent(nextPost.slug);
  };

  window.addEventListener('scroll', () => {
    const h = document.documentElement;
    const scrolled = (h.scrollTop) / (h.scrollHeight - h.clientHeight) * 100;
    document.getElementById('progress').style.width = scrolled + '%';
  });

  function react(btn, emoji){
    const span = btn.querySelector('span');
    span.textContent = parseInt(span.textContent) + 1;
    btn.style.background = '#F0E4D4';
    sb.from('reactions').insert({ post_slug: POST_SLUG, emoji: emoji }).then(({error}) => {
      if(error) console.error('Reaction save failed:', error);
    });
  }

  async function shareFull(){
    const shareData = {
      title: POST.title,
      text: POST.excerpt,
      url: window.location.href,
    };
    if(navigator.share){
      try {
        await navigator.share(shareData);
      } catch(err) {
        // user cancelled the share sheet — no action needed
      }
    } else {
      try {
        await navigator.clipboard.writeText(`${POST.title}\n${POST.excerpt}\n${window.location.href}`);
        alert('Link copied! Paste it anywhere to share. 📋');
      } catch(err) {
        alert('Copy this link to share: ' + window.location.href);
      }
    }
  }

  const popover = document.getElementById('sharePopover');
  let lastSelection = '';
  document.getElementById('postBody').addEventListener('mouseup', (e) => {
    const sel = window.getSelection();
    const text = sel.toString().trim();
    if(text.length > 8){
      lastSelection = text;
      const range = sel.getRangeAt(0).getBoundingClientRect();
      popover.style.display = 'flex';
      popover.style.top = (window.scrollY + range.top - 50) + 'px';
      popover.style.left = (range.left + range.width/2 - 70) + 'px';
    } else {
      popover.style.display = 'none';
    }
  });

  async function shareHighlight(){
    popover.style.display = 'none';
    const shareData = {
      title: POST.title,
      text: `"${lastSelection}" — from ${POST.title}`,
      url: window.location.href,
    };
    if(navigator.share){
      try {
        await navigator.share(shareData);
      } catch(err) {
        // user cancelled — no action needed
      }
    } else {
      try {
        await navigator.clipboard.writeText(`"${lastSelection}"\n— ${POST.title}\n${window.location.href}`);
        alert('Quote copied! Paste it anywhere to share. 📋');
      } catch(err) {
        alert('Copy this quote to share:\n\n"' + lastSelection + '"');
      }
    }
  }

  async function loadComments(){
    const { data, error } = await sb.from('comments')
      .select('*').eq('post_slug', POST_SLUG)
      .order('created_at', { ascending: false });
    if(error){ console.error(error); return; }
    const list = document.getElementById('commentsList');
    if(data.length === 0){
      list.innerHTML = '<div style="color:var(--muted); font-size:0.9rem;">Be the first to share your thoughts.</div>';
      return;
    }
    list.innerHTML = data.map(c => `
      <div class="comment"><span class="who">${c.author_name}<span class="when">${new Date(c.created_at).toLocaleDateString()}</span></span>${c.content}</div>
    `).join('');
  }
  loadComments();

  async function postComment(){
    const ta = document.querySelector('.comment-form textarea');
    if(!ta.value.trim()) return;
    const btn = document.querySelector('.comment-form button');
    btn.textContent = 'Posting...';
    const { error } = await sb.from('comments').insert({
      post_slug: POST_SLUG,
      author_name: 'Guest',
      content: ta.value
    });
    btn.textContent = 'Post comment';
    if(error){
      alert('Comment failed to post — please try again.');
      console.error(error);
      return;
    }
    ta.value = '';
    loadComments();
  }
</script>

</body>
</html>

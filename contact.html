<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — UnBeaten Desire</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3026369923527358"
     crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');
  :root{
    --cream:#FFF8EF; --card:#FFFFFF; --ink:#2E2233; --muted:#8B7E8C;
    --coral:#FF6B57; --line:#F0E4D4;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ background:var(--cream); color:var(--ink); font-family:'Inter',sans-serif; }
  a{ color:inherit; text-decoration:none; }
  nav{
    display:flex; justify-content:space-between; align-items:center;
    padding:20px 6vw; border-bottom:1px solid var(--line);
  }
  .wordmark{ font-family:'Poppins'; font-weight:800; font-size:1.1rem; }
  .wordmark span{ color:var(--coral); }
  .back-link{ font-size:0.85rem; font-weight:600; color:var(--muted); }
  .wrap{ max-width:560px; margin:0 auto; padding:60px 6vw 100px; text-align:center; }
  h1{ font-family:'Poppins'; font-weight:800; font-size:2rem; margin-bottom:16px; }
  .wrap p{ font-size:1rem; line-height:1.7; color:var(--muted); margin-bottom:30px; }
  .contact-card{
    background:var(--card); border:1px solid var(--line); border-radius:22px;
    padding:32px; text-align:left;
  }
  .contact-row{ display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid var(--line); }
  .contact-row:last-child{ border-bottom:none; }
  .contact-icon{ font-size:1.3rem; }
  .contact-label{ font-size:0.78rem; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:0.04em; }
  .contact-value{ font-family:'Poppins'; font-weight:600; font-size:0.98rem; }
  footer{ padding:36px 6vw; text-align:center; font-size:0.8rem; color:var(--muted); }
</style>
</head>
<body>
<nav>
  <a href="unbeatendesire-homepage.html" class="wordmark">Un<span>Beaten</span> Desire</a>
  <a href="unbeatendesire-homepage.html" class="back-link">← Back home</a>
</nav>
<div class="wrap">
  <h1>Get in touch</h1>
  <p>Questions, feedback, a story that stayed with you, or a correction request — reach out through any of these.</p>
  <div class="contact-card">
    <div class="contact-row">
      <span class="contact-icon">📧</span>
      <div>
        <div class="contact-label">Email</div>
        <div class="contact-value">hello@unbeatendesire.com</div>
      </div>
    </div>
    <div class="contact-row">
      <span class="contact-icon">📸</span>
      <div>
        <div class="contact-label">Instagram</div>
        <div class="contact-value">@unbeatendesire</div>
      </div>
    </div>
    <div class="contact-row">
      <span class="contact-icon">📍</span>
      <div>
        <div class="contact-label">Based in</div>
        <div class="contact-value">Bangalore, India</div>
      </div>
    </div>
  </div>
</div>
<footer>UnBeaten Desire — est. 2011 · Bangalore & the internet 🪔</footer>
</body>
</html>
